<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - LaundryClean</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #F4F1E1;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .admin-header h1 {
            font-family: 'Playfair Display', serif;
            color: #1E4A6B;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
        }
        .btn-logout {
            background: #DC2626;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: white;
            border: 1px solid #E2DAB3;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab-btn.active {
            background: #1E4A6B;
            color: white;
            border-color: #1E4A6B;
        }
        .tab-content {
            display: none;
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.05);
        }
        .tab-content.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid #E8E0C5;
        }
        .btn-danger {
            background: #FEE2E2;
            color: #DC2626;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card-admin {
            background: white;
            padding: 1rem;
            border-radius: 20px;
            border-left: 4px solid #F7C35C;
        }
        @media (max-width: 700px) {
            .admin-container {
                padding: 1rem;
            }
            th, td {
                font-size: 0.8rem;
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Admin Panel - LaundryClean</h1>
            <div class="user-info">
                <span id="adminName"></span>
                <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="users">👥 Manajemen User</button>
            <button class="tab-btn" data-tab="laundry">🧺 Data Laundry</button>
            <button class="tab-btn" data-tab="queue">🎫 Antrian</button>
        </div>
        
        <!-- Dashboard -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-cards" id="adminStats">
                <!-- akan diisi JS -->
            </div>
            <div style="margin-top: 1rem;">
                <h3>Aktivitas Terbaru</h3>
                <div id="recentActivity"></div>
            </div>
        </div>
        
        <!-- Manajemen User -->
        <div id="users" class="tab-content">
            <button class="btn-primary" id="addUserBtn" style="margin-bottom: 1rem; background: #2C3E4E; color: white; padding: 0.5rem 1rem; border-radius: 40px; border: none; cursor: pointer;">
                <i class="fas fa-plus"></i> Tambah User
            </button>
            <div class="table-wrapper" style="overflow-x: auto;">
                <table id="usersTable">
                    <thead>
                        <tr><th>ID</th><th>Nama</th><th>Email</th><th>Telepon</th><th>Role</th><th>Aksi</th></tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
        
        <!-- Data Laundry -->
        <div id="laundry" class="tab-content">
            <div class="table-wrapper">
                <table id="laundryTable">
                    <thead><tr><th>No Antrian</th><th>Pelanggan</th><th>Berat</th><th>Total</th><th>Status</th><th>Pembayaran</th><th>Aksi</th></tr></thead>
                    <tbody id="laundryTableBodyAdmin"></tbody>
                </table>
            </div>
        </div>
        
        <!-- Antrian -->
        <div id="queue" class="tab-content">
            <div id="queueListAdmin"></div>
            <button id="resetAllQueueBtn" style="margin-top: 1rem; background: #DC2626; color: white; padding: 0.5rem 1rem; border-radius: 40px; border: none; cursor: pointer;">
                Reset Semua Antrian
            </button>
        </div>
    </div>

    <script>
        // Cek autentikasi
        const currentUser = JSON.parse(localStorage.getItem('laundry_current_user') || '{}');
        if (!currentUser.id || currentUser.role !== 'admin') {
            alert('Akses ditolak! Hanya admin yang bisa mengakses halaman ini.');
            window.location.href = 'login.html';
        }
        
        document.getElementById('adminName').innerText = currentUser.name || 'Admin';
        
        // Fungsi utilitas
        function getUsers() {
            return JSON.parse(localStorage.getItem('laundry_users') || '[]');
        }
        
        function saveUsers(users) {
            localStorage.setItem('laundry_users', JSON.stringify(users));
        }
        
        function getLaundry() {
            return JSON.parse(localStorage.getItem('laundryClean') || '[]');
        }
        
        function saveLaundry(laundry) {
            localStorage.setItem('laundryClean', JSON.stringify(laundry));
        }
        
        function getQueue() {
            return JSON.parse(localStorage.getItem('laundry_queue') || '{"current": 1, "list": []}');
        }
        
        function saveQueue(queue) {
            localStorage.setItem('laundry_queue', JSON.stringify(queue));
        }
        
        // Render Dashboard
        function renderDashboard() {
            const users = getUsers();
            const laundry = getLaundry();
            const queue = getQueue();
            
            const statsHtml = `
                <div class="stat-card-admin"><h3>Total User</h3><p style="font-size: 2rem; font-weight: bold;">${users.length}</p></div>
                <div class="stat-card-admin"><h3>Total Transaksi</h3><p style="font-size: 2rem; font-weight: bold;">${laundry.length}</p></div>
                <div class="stat-card-admin"><h3>Antrian Aktif</h3><p style="font-size: 2rem; font-weight: bold;">${queue.list.length}</p></div>
                <div class="stat-card-admin"><h3>Pendapatan</h3><p style="font-size: 1.2rem; font-weight: bold;">Rp ${laundry.reduce((sum, item) => sum + (item.weight * (item.serviceType === 'reguler' ? 8000 : item.serviceType === 'express' ? 12000 : 5000)), 0).toLocaleString('id-ID')}</p></div>
            `;
            document.getElementById('adminStats').innerHTML = statsHtml;
            
            const recent = [...laundry].reverse().slice(0, 5);
            document.getElementById('recentActivity').innerHTML = recent.map(l => `
                <div style="padding: 0.5rem; border-bottom: 1px solid #E8E0C5;">📌 ${l.customerName} - ${l.status} - Rp ${(l.weight * (l.serviceType === 'reguler' ? 8000 : l.serviceType === 'express' ? 12000 : 5000)).toLocaleString('id-ID')}</div>
            `).join('') || '<p>Belum ada aktivitas</p>';
        }
        
        // Render Users
        function renderUsers() {
            const users = getUsers();
            document.getElementById('usersTableBody').innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.phone || '-'}</td>
                    <td><span style="background: ${u.role === 'admin' ? '#FEF3C7' : '#E0E7FF'}; padding: 0.2rem 0.5rem; border-radius: 20px;">${u.role}</span></td>
                    <td>${u.role !== 'admin' ? `<button class="btn-danger" onclick="deleteUser(${u.id})">Hapus</button>` : '-'}</td>
                </tr>
            `).join('');
        }
        
        window.deleteUser = function(id) {
            if (confirm('Yakin hapus user ini?')) {
                let users = getUsers();
                users = users.filter(u => u.id !== id);
                saveUsers(users);
                renderUsers();
                renderDashboard();
            }
        };
        
        // Render Laundry
        function renderLaundry() {
            const laundry = getLaundry();
            document.getElementById('laundryTableBodyAdmin').innerHTML = laundry.map(l => `
                <tr>
                    <td>${l.queueNumber || '-'}</td>
                    <td>${l.customerName}</td>
                    <td>${l.weight} kg</td>
                    <td>Rp ${(l.weight * (l.serviceType === 'reguler' ? 8000 : l.serviceType === 'express' ? 12000 : 5000)).toLocaleString('id-ID')}</td>
                    <td><span style="background: ${l.status === 'selesai' ? '#D1FAE5' : '#FEF3C7'}; padding: 0.2rem 0.5rem; border-radius: 20px;">${l.status}</span></td>
                    <td>${l.paymentStatus === 'paid' ? '✅ Lunas' : '⏳ Belum'}</td>
                    <td><button class="btn-danger" onclick="deleteLaundry(${l.id})">Hapus</button></td>
                </tr>
            `).join('');
        }
        
        window.deleteLaundry = function(id) {
            if (confirm('Hapus transaksi laundry?')) {
                let laundry = getLaundry();
                laundry = laundry.filter(l => l.id !== id);
                saveLaundry(laundry);
                renderLaundry();
                renderDashboard();
            }
        };
        
        // Render Queue
        function renderQueue() {
            const queue = getQueue();
            document.getElementById('queueListAdmin').innerHTML = `
                <h3>Antrian Saat Ini: ${queue.current}</h3>
                <div style="background: #FEFAF0; padding: 1rem; border-radius: 16px;">
                    <strong>Daftar Antrian:</strong>
                    <ul>${queue.list.map(q => `<li>${q.queueNumber} - ${q.customerName}</li>`).join('') || '<li>Tidak ada antrian</li>'}</ul>
                </div>
            `;
        }
        
        document.getElementById('resetAllQueueBtn').addEventListener('click', () => {
            if (confirm('Reset semua antrian?')) {
                saveQueue({ current: 1, list: [] });
                renderQueue();
                renderDashboard();
            }
        });
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
                
                if (tabId === 'dashboard') renderDashboard();
                if (tabId === 'users') renderUsers();
                if (tabId === 'laundry') renderLaundry();
                if (tabId === 'queue') renderQueue();
            });
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('laundry_current_user');
            window.location.href = 'login.html';
        });
        
        document.getElementById('addUserBtn').addEventListener('click', () => {
            const name = prompt('Nama lengkap:');
            const email = prompt('Email:');
            const password = prompt('Password:');
            if (name && email && password) {
                const users = getUsers();
                users.push({
                    id: Date.now(),
                    name, email, password,
                    phone: '-',
                    role: 'user',
                    createdAt: new Date().toISOString()
                });
                saveUsers(users);
                renderUsers();
                renderDashboard();
                alert('User berhasil ditambahkan!');
            }
        });
        
        // Initial render
        renderDashboard();
        renderUsers();
        renderLaundry();
        renderQueue();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lupa Password - LaundryClean</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation .bubble {
            position: absolute;
            background: radial-gradient(circle, rgba(247, 195, 92, 0.15), transparent);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-100px); opacity: 0.6; }
        }

        .auth-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #F7C35C, #F4A261);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: white;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            font-size: 0.95rem;
            color: white;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #F7C35C;
            box-shadow: 0 0 15px rgba(247, 195, 92, 0.3);
        }

        .btn-auth {
            width: 100%;
            background: linear-gradient(135deg, #F7C35C, #F4A261);
            color: #1a1a2e;
            border: none;
            padding: 0.9rem;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-auth:hover {
            transform: scale(0.98);
            box-shadow: 0 10px 25px -5px rgba(247, 195, 92, 0.5);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .auth-footer a {
            color: #F7C35C;
            text-decoration: none;
        }

        .alert {
            padding: 0.8rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }

        .alert-error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.5);
            color: #FF6B6B;
        }

        .alert-success {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid rgba(39, 174, 96, 0.5);
            color: #2ECC71;
        }

        .info-text {
            background: rgba(247, 195, 92, 0.15);
            padding: 0.8rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #F7C35C;
            text-align: center;
        }

        .reset-form {
            display: none;
        }

        @media (max-width: 768px) {
            .auth-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bubble" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
        <div class="bubble" style="width: 200px; height: 200px; top: 50%; right: -50px;"></div>
        <div class="bubble" style="width: 150px; height: 150px; bottom: 10%; left: 15%;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1>Lupa Password?</h1>
                <p>Tenang, kami akan membantu Anda 🔑</p>
            </div>

            <div id="errorMsg" class="alert alert-error"></div>
            <div id="successMsg" class="alert alert-success"></div>

            <!-- Step 1 -->
            <div id="step1">
                <div class="info-text">
                    <i class="fas fa-info-circle"></i> Masukkan email Anda. Kami akan mengirimkan kode verifikasi.
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="resetEmail" placeholder="contoh@email.com">
                    </div>
                </div>
                <button class="btn-auth" id="sendCodeBtn">
                    <i class="fas fa-paper-plane"></i> Kirim Kode Verifikasi
                </button>
            </div>

            <!-- Step 2 -->
            <div id="step2" class="reset-form">
                <div class="info-text">
                    <i class="fas fa-qrcode"></i> Masukkan kode verifikasi dan password baru Anda.
                </div>
                <div class="input-group">
                    <label><i class="fas fa-qrcode"></i> Kode Verifikasi</label>
                    <div class="input-wrapper">
                        <i class="fas fa-qrcode"></i>
                        <input type="text" id="verificationCode" placeholder="6 digit kode">
                    </div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password Baru</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Minimal 6 karakter">
                    </div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Konfirmasi Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmNewPassword" placeholder="Ulangi password baru">
                    </div>
                </div>
                <button class="btn-auth" id="resetPasswordBtn">
                    <i class="fas fa-check-circle"></i> Reset Password
                </button>
            </div>

            <div class="auth-footer">
                <p><a href="login.html"><i class="fas fa-arrow-left"></i> Kembali ke Login</a></p>
            </div>
        </div>
    </div>

    <script>
        let verificationCode = '';
        let resetEmailAddress = '';

        function getUsers() {
            const users = localStorage.getItem('laundry_users');
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem('laundry_users', JSON.stringify(users));
        }

        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        document.getElementById('sendCodeBtn')?.addEventListener('click', () => {
            const email = document.getElementById('resetEmail').value.trim();
            const users = getUsers();
            const userExists = users.some(u => u.email === email);

            if (!email) {
                showError('Masukkan email Anda!');
                return;
            }

            if (!userExists) {
                showError('Email tidak terdaftar! Silakan registrasi terlebih dahulu.');
                return;
            }

            verificationCode = generateCode();
            resetEmailAddress = email;

            // Simulasi kirim email
            alert(`📧 SIMULASI EMAIL\n\nKe: ${email}\nKode Verifikasi: ${verificationCode}\n\nMasukkan kode ini untuk mereset password Anda.`);

            showSuccess(`Kode verifikasi telah dikirim ke ${email}`);
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        });

        document.getElementById('resetPasswordBtn')?.addEventListener('click', () => {
            const inputCode = document.getElementById('verificationCode').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;

            if (inputCode !== verificationCode) {
                showError('Kode verifikasi salah!');
                return;
            }

            if (newPassword.length < 6) {
                showError('Password baru minimal 6 karakter!');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('Password dan konfirmasi tidak cocok!');
                return;
            }

            const users = getUsers();
            const updatedUsers = users.map(u => {
                if (u.email === resetEmailAddress) {
                    return { ...u, password: newPassword };
                }
                return u;
            });
            saveUsers(updatedUsers);

            showSuccess('✅ Password berhasil direset! Mengalihkan ke halaman login...');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>

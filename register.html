<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - LaundryClean</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🧺 Laundry<span>Clean</span></h1>
                <p style="color: #6B7A7F;">Daftar akun baru</p>
            </div>
            
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" id="fullname" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" required placeholder="contoh@email.com">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> No. Telepon</label>
                    <input type="tel" id="phone" placeholder="08123456789">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="Minimal 6 karakter">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Ulangi password">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user-tag"></i> Daftar Sebagai</label>
                    <select id="role">
                        <option value="user">Pelanggan (User)</option>
                        <option value="admin">Admin (Khusus Owner)</option>
                    </select>
                    <div class="role-hint">*Akun admin hanya untuk pemilik laundry</div>
                </div>
                <button type="submit" class="btn-auth">Daftar Sekarang</button>
            </form>
            
            <div class="auth-footer">
                <p>Sudah punya akun? <a href="login.html">Login Disini</a></p>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        function getUsers() {
            const users = localStorage.getItem('laundry_users');
            return users ? JSON.parse(users) : [];
        }

        function saveUsers(users) {
            localStorage.setItem('laundry_users', JSON.stringify(users));
        }

        // Cek apakah sudah ada user admin? jika belum, buat default admin
        function initDefaultAdmin() {
            const users = getUsers();
            const hasAdmin = users.some(u => u.role === 'admin');
            if (!hasAdmin) {
                users.push({
                    id: Date.now(),
                    name: 'Administrator',
                    email: 'admin@laundry.com',
                    phone: '08123456789',
                    password: 'admin123',
                    role: 'admin',
                    createdAt: new Date().toISOString()
                });
                saveUsers(users);
            }
        }
        initDefaultAdmin();

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            
            // Validasi
            if (!fullname || !email || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Harap isi semua field yang wajib!';
                successMsg.style.display = 'none';
                return;
            }
            
            if (password.length < 6) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Password minimal 6 karakter!';
                successMsg.style.display = 'none';
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Password dan konfirmasi password tidak cocok!';
                successMsg.style.display = 'none';
                return;
            }
            
            const users = getUsers();
            
            // Cek email sudah terdaftar
            if (users.some(u => u.email === email)) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Email sudah terdaftar! Gunakan email lain.';
                successMsg.style.display = 'none';
                return;
            }
            
            // Simpan user baru
            const newUser = {
                id: Date.now(),
                name: fullname,
                email: email,
                phone: phone,
                password: password,
                role: role,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            saveUsers(users);
            
            successMsg.style.display = 'block';
            successMsg.textContent = 'Registrasi berhasil! Mengalihkan ke halaman login...';
            errorMsg.style.display = 'none';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>

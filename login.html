<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LaundryClean</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
     <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #F4F1E1 0%, #E8E0C5 100%);
        }
        .auth-container {
            max-width: 420px;
            width: 90%;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 20px 20px 0 rgba(44, 62, 78, 0.1);
            border: 1px solid #E8E0C5;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #1E4A6B;
        }
        .auth-header h1 span {
            color: #F4A261;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2C3E4E;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #E2DAB3;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #F7C35C;
            box-shadow: 0 0 0 3px rgba(247, 195, 92, 0.1);
        }
        .btn-auth {
            width: 100%;
            background: #2C3E4E;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }
        .btn-auth:hover {
            background: #F4A261;
            color: #1E2F3A;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }
        .auth-footer a {
            color: #F4A261;
            text-decoration: none;
        }
        .error-msg {
            background: #FEE2E2;
            color: #DC2626;
            padding: 0.7rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }
        .success-msg {
            background: #D1FAE5;
            color: #059669;
            padding: 0.7rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🧺 Laundry<span>Clean</span></h1>
                <p style="color: #6B7A7F; margin-top: 0.5rem;">Login ke akun Anda</p>
            </div>
            
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" required placeholder="contoh@email.com">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="******">
                </div>
                <button type="submit" class="btn-auth">Login</button>
            </form>
            
            <div class="auth-footer">
                <p>Belum punya akun? <a href="register.html">Daftar Sekarang</a></p>
                <p><a href="forgot-pw.html">Lupa Password?</a></p>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Ambil data users dari localStorage
        function getUsers() {
            const users = localStorage.getItem('laundry_users');
            return users ? JSON.parse(users) : [];
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Simpan session user
                localStorage.setItem('laundry_current_user', JSON.stringify({
                    id: user.id,
                    name: user.name,
                    email: user.email,
                    role: user.role
                }));
                
                successMsg.style.display = 'block';
                successMsg.textContent = 'Login berhasil! Mengalihkan...';
                errorMsg.style.display = 'none';
                
                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1500);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Email atau password salah!';
                successMsg.style.display = 'none';
            }
        });
    </script>
</body>
</html>
